version: '3.8'

x-build-args: &build-args
  VERSION: ${QUANTCLAW_VERSION:-0.3.0-alpha}
  BUILD_DATE: ${BUILD_DATE:-}
  VCS_REF: ${VCS_REF:-}

services:
  quantclaw:
    build:
      context: ..
      dockerfile: scripts/Dockerfile
      args:
        <<: *build-args
    image: quantclaw:${QUANTCLAW_VERSION:-0.3.0-alpha}
    container_name: quantclaw
    restart: unless-stopped
    ports:
      - "18800:18800"   # Gateway WebSocket
      - "18801:18801"   # Dashboard/REST API
    volumes:
      - quantclaw_data:/home/quantclaw/.quantclaw
    environment:
      - QUANTCLAW_LOG_LEVEL=${QUANTCLAW_LOG_LEVEL:-info}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    networks:
      - quantclaw_network
    healthcheck:
      test: ["CMD", "quantclaw", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M

  quantclaw-test:
    build:
      context: ..
      dockerfile: scripts/Dockerfile.test
    image: quantclaw-test:${QUANTCLAW_VERSION:-0.3.0-alpha}
    container_name: quantclaw-test

  quantclaw-dev:
    build:
      context: ..
      dockerfile: scripts/Dockerfile.dev
    image: quantclaw-dev:${QUANTCLAW_VERSION:-0.3.0-alpha}
    container_name: quantclaw-dev
    ports:
      - "18800:18800"
      - "18801:18801"
    volumes:
      - ..:/app            # live source mount for development
      - quantclaw_dev_data:/root/.quantclaw
    stdin_open: true
    tty: true

volumes:
  quantclaw_data:
    driver: local
  quantclaw_dev_data:
    driver: local

networks:
  quantclaw_network:
    driver: bridge
